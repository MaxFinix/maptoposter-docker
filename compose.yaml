name: maptoposter

services:
  maptoposter:
    build:
      # Hier deinen eigenen GitHub-Repo-Link eintragen, Format: https://github.com/<user>/<repo>.git#<branch>
      context: https://github.com/MaxFinix/maptoposter-docker.git#main
      dockerfile: Dockerfile
    container_name: maptoposter
    restart: unless-stopped
    # Default on Unraid: run without a fixed user so fresh appdata folders stay writable.
    # Optional: use `user: "99:100"` only after preparing the mounted folders with matching permissions.
    ports:
      - target: 6641
        published: "6641"
        protocol: tcp
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 6641
      MPLBACKEND: Agg
      MPLCONFIGDIR: /app/data/cache/matplotlib
      POSTERS_DIR: /app/data/posters
      CACHE_DIR: /app/data/cache
      FONTS_CACHE_DIR: /app/data/fonts-cache
    volumes:
      - /mnt/user/appdata/maptoposter:/app/data
